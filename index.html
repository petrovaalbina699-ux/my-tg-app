<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Отчёт закрытия смены</title>
    
    <!-- Скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Библиотека иконок Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #FDF0F0; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding-bottom: 48px; 
            color: #3D1A1A;
        }
        .screen { max-width: 480px; margin: 0 auto; }
        
        /* Верхняя панель */
        .topbar { padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px; }
        .back-btn { 
            width: 38px; height: 38px; border-radius: 50%; background: #F5D0D0; border: none; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
            transition: background 0.2s;
        }
        .back-btn:active { background: #E8C8C8; }
        .back-btn i { font-size: 20px; color: #7B3B3B; }
        .topbar-title { font-size: 17px; font-weight: 600; color: #3D1A1A; }
        .topbar-sub { font-size: 13px; color: #A06060; }

        /* Индикатор шагов (теперь единый для всех страниц) */
        .steps { display: flex; align-items: center; gap: 0; padding: 0 20px 18px; }
        .st { display: flex; align-items: center; gap: 0; flex: 1; }
        .st-circle { 
            width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #E8C8C8; background: #fff; 
            display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; 
            color: #C49090; flex-shrink: 0; transition: all 0.3s ease;
        }
        .st-circle.active { background: #7B3B3B; border-color: #7B3B3B; color: #fff; transform: scale(1.1); }
        .st-circle.done { background: #F5D0D0; border-color: #C49090; color: #7B3B3B; }
        .st-line { flex: 1; height: 2px; background: #E8C8C8; transition: background 0.3s ease; }
        .st-line.done { background: #C49090; }

        /* Карточки */
        .card { background: #fff; border: 0.5px solid #E8C8C8; border-radius: 16px; padding: 22px 20px; margin: 0 16px; box-shadow: 0 4px 12px rgba(62, 39, 35, 0.04); }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .card-icon { width: 40px; height: 40px; border-radius: 10px; background: #FDF0F0; border: 0.5px solid #E8C8C8; display: flex; align-items: center; justify-content: center; }
        .card-icon i { font-size: 20px; color: #7B3B3B; }
        .card-title { font-size: 16px; font-weight: 600; color: #3D1A1A; }
        .card-sub { font-size: 13px; color: #A06060; margin-top: 2px; }

        /* Поля ввода */
        .field { margin-bottom: 16px; }
        .field:last-child { margin-bottom: 0; }
        label { font-size: 13px; color: #7B5050; display: block; margin-bottom: 6px; font-weight: 500; }
        input, select, textarea { 
            width: 100%; font-size: 15px; padding: 12px 14px; border: 1px solid #E8C8C8; border-radius: 10px; 
            background: #FFFAFA; color: #3D1A1A; outline: none; transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: #7B3B3B; background: #fff; box-shadow: 0 0 0 3px rgba(123, 59, 59, 0.1); }
        textarea { resize: none; line-height: 1.5; }
        
        .amount-wrap { position: relative; }
        .amount-wrap input { padding-left: 32px; }
        .currency { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #A06060; pointer-events: none; font-weight: 500; }
        
        .err-msg { font-size: 13px; color: #A32D2D; margin-top: 6px; display: none; align-items: center; gap: 4px; }
        .err-msg i { font-size: 14px; }
